{% extends "base/navbar1.html" %}
{% load socialaccount %}

{% block content %}
<div class="flex items-center justify-center min-h-screen">
    <div class="max-w-lg p-8 rounded-2xl shadow-lg bg-white w-full" style="margin-top: -10vh;">
        <h1 class="text-2xl font-bold mb-4">Continuar con Google</h1>
        <p class="text-gray-600 mb-6">
            Estás a punto de iniciar sesión usando tu cuenta de Google.
        </p>

        <form method="post">
            {% csrf_token %}
            <button class="w-full py-3 rounded-xl bg-blue-600 text-white font-semibold">
                Continuar
            </button>
        </form>
    </div>
</div>
{% endblock %}
