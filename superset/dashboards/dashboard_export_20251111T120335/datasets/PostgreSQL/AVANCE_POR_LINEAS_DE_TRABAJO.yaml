table_name: AVANCE POR LINEAS DE TRABAJO
main_dttm_col: null
description: null
default_endpoint: null
offset: 0
cache_timeout: null
catalog: gespro
schema: public
sql: "SELECT \r\n    lt.nombre as linea_trabajo,\r\n    CASE \r\n        WHEN ab.estado\
  \ = 'PEN' THEN 'Pendiente'\r\n        WHEN ab.estado = 'LPC' THEN 'Listo'\r\n  \
  \      WHEN ab.estado = 'EPR' THEN 'En Progreso'\r\n        WHEN ab.estado = 'COM'\
  \ THEN 'Completada'\r\n        WHEN ab.estado = 'TER' THEN 'Terminada'\r\n    END\
  \ as estado,\r\n    COUNT(*) as cantidad\r\nFROM proyectos_lineatrabajo lt\r\nINNER\
  \ JOIN proyectos_actividad a ON lt.id = a.linea_trabajo_id\r\nINNER JOIN proyectos_actividadbase\
  \ ab ON a.actividadbase_ptr_id = ab.id\r\nWHERE lt.estado = true\r\nGROUP BY lt.nombre,\
  \ ab.estado\r\nORDER BY lt.nombre, ab.estado;"
