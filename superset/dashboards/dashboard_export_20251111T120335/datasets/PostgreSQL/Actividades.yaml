cache_timeout: null
catalog: gespro
schema: null
sql: "SELECT\n    -- Informaci\xF3n base de la actividad\n    base.id AS actividad_id,\n\
  \    base.nombre AS actividad_nombre,\n    base.estado AS actividad_estado,\n  \
  \  base.n_act,\n\n    -- Tipo de Actividad (Normal o Difusi\xF3n)\n    CASE \n \
  \       WHEN act_normal.actividadbase_ptr_id IS NOT NULL THEN 'Normal'\n       \
  \ WHEN act_difusion.actividadbase_ptr_id IS NOT NULL THEN 'Difusi\xF3n'\n      \
  \  ELSE 'Desconocido'\n    END AS tipo_actividad,\n\n    -- Informaci\xF3n del Proyecto\
  \ (obtenida por cualquiera de las dos v\xEDas)\n    p.id AS proyecto_id,\n    p.nombre\
  \ AS proyecto_nombre,\n    p.fecha_fin AS proyecto_fecha_limite,\n\n    -- Informaci\xF3\
  n de la L\xEDnea de Trabajo (solo para Actividades Normales)\n    lt.id AS linea_trabajo_id,\n\
  \    lt.nombre AS linea_trabajo_nombre,\n\n    -- Fechas de la Actividad (obtenemos\
  \ el rango m\xE1s amplio)\n    fechas.min_fecha_inicio AS actividad_fecha_inicio,\n\
  \    fechas.max_fecha_fin AS actividad_fecha_limite, -- <-- Aqu\xED est\xE1 tu \"\
  fecha l\xEDmite\" por actividad\n\n    -- === Columnas de Banderas (Flags) para\
  \ facilitar m\xE9tricas en Superset ===\n    \n    -- 1. Para contar tipos\n   \
  \ CASE WHEN act_normal.actividadbase_ptr_id IS NOT NULL THEN 1 ELSE 0 END AS es_normal,\n\
  \    CASE WHEN act_difusion.actividadbase_ptr_id IS NOT NULL THEN 1 ELSE 0 END AS\
  \ es_difusion,\n\n    -- 2. Para calcular porcentajes\n    CASE WHEN base.estado\
  \ IN ('COM', 'TER') THEN 1 ELSE 0 END AS es_completada,\n    \n    -- 3. Para \xCD\
  ndice de Progreso (Asumimos que \"Progreso\" = En Progreso, Completada o Terminada)\n\
  \    CASE WHEN base.estado IN ('EPR', 'COM', 'TER') THEN 1 ELSE 0 END AS es_en_progreso_o_mas\n\
  \nFROM\n    -- La tabla base que tiene TODAS las actividades\n    proyectos_actividadbase\
  \ AS base\n\n-- Uni\xF3n para identificar Actividades Normales y obtener su l\xED\
  nea de trabajo\nLEFT JOIN\n    proyectos_actividad AS act_normal ON base.id = act_normal.actividadbase_ptr_id\n\
  LEFT JOIN\n    proyectos_lineatrabajo AS lt ON act_normal.linea_trabajo_id = lt.id\n\
  \n-- Uni\xF3n para identificar Actividades de Difusi\xF3n\nLEFT JOIN\n    proyectos_actividaddifusion\
  \ AS act_difusion ON base.id = act_difusion.actividadbase_ptr_id\n\n-- Uni\xF3n\
  \ para obtener el Proyecto\n-- Usamos COALESCE para tomar el proyecto_id de la l\xED\
  nea de trabajo (si es Normal)\n-- o directamente de la actividad de difusi\xF3n\
  \ (si es Difusi\xF3n)\nLEFT JOIN\n    proyectos_proyecto AS p ON p.id = COALESCE(lt.proyecto_id,\
  \ act_difusion.proyecto_id)\n\n-- Subconsulta para obtener la fecha de inicio m\xE1\
  s temprana y la fecha de fin (l\xEDmite) m\xE1s tard\xEDa\n-- para cada actividad,\
  \ basado en tu modelo 'Fecha'.\nLEFT JOIN (\n    SELECT\n        actividad_id,\n\
  \        MIN(fecha_inicio) AS min_fecha_inicio,\n        MAX(fecha_fin) AS max_fecha_fin\n\
  \    FROM\n        proyectos_fecha\n    WHERE\n        estado = TRUE\n    GROUP\
  \ BY\n        actividad_id\n) AS fechas ON base.id = fechas.actividad_id;"
