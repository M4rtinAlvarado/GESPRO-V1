sql: "SELECT \r\n    ROUND(\r\n        1.0 * (\r\n            COUNT(CASE WHEN estado\
  \ = 'COM' THEN 1 END) * 1.0 +\r\n            COUNT(CASE WHEN estado = 'TER' THEN\
  \ 1 END) * 1.0 +\r\n            COUNT(CASE WHEN estado = 'EPR' THEN 1 END) * 0.5\r\
  \n        ) / NULLIF(COUNT(*), 0),\r\n        3\r\n    ) as indice_progreso\r\n\
  FROM proyectos_actividadbase;"
