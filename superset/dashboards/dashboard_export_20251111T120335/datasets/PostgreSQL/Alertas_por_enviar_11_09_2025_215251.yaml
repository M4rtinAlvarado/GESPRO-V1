sql: "SELECT ab.nombre as actividad, al.fecha_envio, CASE WHEN al.enviado = true THEN\
  \ 'S\xED' ELSE 'No' END as enviado, al.fecha_envio - CURRENT_DATE as dias_restantes\
  \ FROM proyectos_alerta al JOIN proyectos_actividadbase ab ON al.actividad_id =\
  \ ab.id WHERE ab.estado != 'COM' AND al.fecha_envio >= CURRENT_DATE ORDER BY al.fecha_envio\
  \ ASC LIMIT 20;"
