sql: "SELECT \r\n    CASE estado\r\n        WHEN 'PEN' THEN '1. Pendiente'\r\n   \
  \     WHEN 'LPC' THEN '2. Listo para Iniciar'\r\n        WHEN 'EPR' THEN '3. En\
  \ Progreso'\r\n        WHEN 'COM' THEN '4. Completada'\r\n        WHEN 'TER' THEN\
  \ '5. Terminada'\r\n        ELSE 'Otro'\r\n    END as estado_actividad,\r\n    COUNT(*)\
  \ as cantidad\r\nFROM proyectos_actividadbase\r\nGROUP BY estado\r\nORDER BY estado_actividad;"
