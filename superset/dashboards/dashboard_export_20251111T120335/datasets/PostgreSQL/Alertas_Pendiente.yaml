catalog: gespro
schema: null
sql: "SELECT \r\n    ab.nombre as actividad,\r\n    ab.n_act as numero,\r\n    al.fecha_envio,\r\
  \n    CASE \r\n        WHEN al.fecha_envio < CURRENT_TIMESTAMP THEN 'Vencida'\r\n\
  \        WHEN al.fecha_envio < CURRENT_TIMESTAMP + INTERVAL '7 days' THEN 'Esta\
  \ Semana'\r\n        WHEN al.fecha_envio < CURRENT_TIMESTAMP + INTERVAL '30 days'\
  \ THEN 'Este Mes'\r\n        ELSE 'Furura'\r\n    END as urgencia,\r\n    al.fecha_envio\
  \ - CURRENT_TIMESTAMP as tiempo_restante\r\nFROM proyectos_alerta al\r\nJOIN proyectos_actividadbase\
  \ ab \r\n    ON al.actividad_id = ab.id\r\nWHERE al.enviado = false \r\n    AND\
  \ ab.estado NOT IN ('COM', 'TER')\r\nORDER BY al.fecha_envio ASC\r\nLIMIT 20;"
