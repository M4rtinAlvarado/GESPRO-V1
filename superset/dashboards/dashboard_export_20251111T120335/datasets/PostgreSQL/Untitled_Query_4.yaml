sql: "SELECT \r\n    e.nombre as encargado,\r\n    COUNT(ae.actividad_id) as total_actividades,\r\
  \n    COUNT(CASE WHEN ab.estado IN ('EPR', 'LPC', 'PEN') THEN 1 END) as activas\r\
  \nFROM proyectos_encargado e\r\nJOIN proyectos_actividad_encargado ae \r\n    ON\
  \ e.id = ae.encargado_id\r\nJOIN proyectos_actividadbase ab \r\n    ON ae.actividad_id\
  \ = ab.id\r\nWHERE e.estado = true \r\n    AND ae.estado = true\r\nGROUP BY e.nombre\r\
  \nORDER BY total_actividades DESC\r\nLIMIT 5;"
