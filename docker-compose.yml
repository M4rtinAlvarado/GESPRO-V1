version: '3.8'

services:
  # ==========================================
  # BASE DE DATOS (Postgres)
  # ==========================================
  database:
    image: ${DB_IMAGE:-postgres:15-alpine}
    container_name: ${GROUP}_${PROJECT}_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
    # networks:
    #   - red_taller_software
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    labels:
      - "org.uach.group=${GROUP}"
      - "org.uach.project=${PROJECT}"
      - "org.uach.service=database"
      - "logging=promtail"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # DJANGO (Monolítico, backend + frontend)
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${GROUP}_${PROJECT}_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    depends_on:
      database:
        condition: service_healthy
    # networks:
    #   - red_taller_software
    command: >
     sh -c "python backend/manage.py migrate &&
            python backend/manage.py tailwind install &&
            python backend/manage.py tailwind build &&
            python backend/manage.py runserver 0.0.0.0:${BACKEND_PORT}"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 700M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    labels:
      - "org.uach.group=${GROUP}"
      - "org.uach.project=${PROJECT}"
      - "org.uach.service=backend"
      - "logging=promtail"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${BACKEND_PORT}/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      DB_HOST: database
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}


volumes:
  db_data:
    name: ${GROUP}_${PROJECT}_db_data

