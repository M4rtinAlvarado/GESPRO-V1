services:
  frontend:
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python backend/manage.py migrate &&
             python backend/manage.py runserver 0.0.0.0:3003"
    restart: "on-failure"
    build: .
    ports:
      - "3003:3003"
    # networks:
    #   - red_taller_software
  db: 
    image: postgres:15-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U albaca -d gespro"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: gespro
      POSTGRES_USER: albaca
      POSTGRES_PASSWORD: 9E5Og5yodW6u0S
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
  superset:
    build:
      context: .
      dockerfile: superset.Dockerfile 
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: '65xo4J3AvtbK1A' 
      MAPBOX_API_KEY: '' 
    volumes:
      - superset_home:/app/superset/
    # networks:
    #   - red_taller_software
    command: 
      - /bin/bash 
      - -c 
      - |
        superset db upgrade && 
        superset fab create-admin \
          --username 'admin' \
          --firstname 'Super' \
          --lastname 'Admin' \
          --email 'admin@example.com' \
          --password 'adminpass123' || true && 
        superset init &&
        superset run -h 0.0.0.0 -p 8088
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy

volumes:
  superset_home:
  postgres_data:

