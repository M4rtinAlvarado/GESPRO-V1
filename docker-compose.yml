services:
  gespro-frontend:
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python backend/manage.py migrate &&
             python backend/manage.py runserver 0.0.0.0:3003"
    restart: "on-failure"
    build: .
    ports:
      - "${DJANGO_HOST_PORT:-3003}:3003"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3003/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    # networks:
    #   - red_taller_software
  db: 
    image: postgres:15-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U albaca -d gespro"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gespro}
      POSTGRES_USER: ${POSTGRES_USER:-albaca}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-9E5Og5yodW6u0S}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
  superset:
    build:
      context: .
      dockerfile: superset/superset.Dockerfile 
    ports:
      - "${SUPERSET_HOST_PORT:-3004}:8088"
    environment:
      SUPERSET_SECRET_KEY: '65xo4J3AvtbK1A'
      MAPBOX_API_KEY: ''
      # Conexión del metadata DB de Superset hacia el servicio 'db' definido en este compose
      SQLALCHEMY_DATABASE_URI: 'postgresql+psycopg2://${POSTGRES_USER:-albaca}:${POSTGRES_PASSWORD:-9E5Og5yodW6u0S}@${DB_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-gespro}'
    volumes:
      - superset_home:/app/superset/
    # networks:
    #   - red_taller_software
    command: 
      - /bin/bash 
      - -c 
      - |
        superset db upgrade && 
        superset fab create-admin \
          --username "${SUPERSET_ADMIN_USERNAME:-admin}" \
          --firstname "${SUPERSET_ADMIN_FIRSTNAME:-Super}" \
          --lastname "${SUPERSET_ADMIN_LASTNAME:-Admin}" \
          --email "${SUPERSET_ADMIN_EMAIL:-admin@example.com}" \
          --password "${SUPERSET_ADMIN_PASSWORD:-adminpass123}" || true && 
        superset init &&
        superset run -h 0.0.0.0 -p 8088
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy

volumes:
  superset_home:
  postgres_data:

